<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Discography</title>
    <link rel="icon" href="images/favicon.ico" />
    <link rel="stylesheet" href="css/bootstrap.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="discography-page">
    <main class="discography-page-wrap">
      <header class="discography-header">
        <div class="discography-left-links">
          <a class="home-link" href="index.html">Home</a>
          <ul class="lang-switcher">
            <li><a href="#">English</a></li>
            <li>|</li>
            <li><a href="#">عربي</a></li>
          </ul>
        </div>
        <ul class="discography-socials">
          <li><a href="#" aria-label="mute"><i class="fa-solid fa-volume-xmark"></i></a></li>
          <li><a href="#" aria-label="volume"><i class="fa-solid fa-volume-high"></i></a></li>
          <li><a href="#" aria-label="linkedin"><i class="fa-brands fa-linkedin"></i></a></li>
          <li><a href="#" aria-label="youtube"><i class="fa-brands fa-square-youtube"></i></a></li>
          <li><a href="#" aria-label="facebook"><i class="fa-brands fa-square-facebook"></i></a></li>
          <li><a href="#" aria-label="instagram"><i class="fa-brands fa-square-instagram"></i></a></li>
        </ul>
      </header>

      <section class="discography-layout">
        <div class="disc-left-col">
          <div class="main-disc">
            <div class="disc-half disc-photo"></div>
            <div class="disc-half disc-art"></div>
          </div>
          <div class="disc-side-albums">
            <button class="mini-album active" type="button" data-title="Ishraq-Reminiscence">
              <img src="images/disc/thumb-1.jpg" alt="Ishraq-Reminiscence" />
              <span>Ishraq-Reminiscence</span>
            </button>
            <button class="mini-album" type="button" data-title="Hajess">
              <img src="images/disc/photo-1.jpg" alt="Hajess" />
              <span>Hajess</span>
            </button>
            <button class="mini-album" type="button" data-title="Glory of The Irises">
              <img src="images/disc/art-1.jpg" alt="Glory of The Irises" />
              <span>Glory of The Irises</span>
            </button>
          </div>
        </div>

        <div class="disc-right-col">
          <h1 id="albumTitle">Homayoun</h1>
          <ul class="track-listing">
            <li><span>-1 Track 1</span><div class="line"><span style="width:48%"></span></div></li>
            <li><span>-2 Track 2</span><div class="line"><span style="width:50%"></span></div></li>
            <li><span>-3 Track 3</span><div class="line"><span style="width:46%"></span></div></li>
            <li><span>-4 Track 4</span><div class="line"><span style="width:49%"></span></div></li>
            <li><span>-5 Track 5</span><div class="line"><span style="width:51%"></span></div></li>
            <li><span>-6 Track 6</span><div class="line"><span style="width:45%"></span></div></li>
            <li><span>-7 Track 7</span><div class="line"><span style="width:47%"></span></div></li>
            <li><span>-8 Track 8</span><div class="line"><span style="width:44%"></span></div></li>
            <li><span>-9 Track 9</span><div class="line"><span style="width:52%"></span></div></li>
          </ul>
        </div>
      </section>

      <section class="album-detail-box" aria-label="album notes"></section>
    </main>

    <script src="js/jquery-3.4.1.min.js"></script>
    <script src="js/scripts.js"></script>
  </body>
</html>
